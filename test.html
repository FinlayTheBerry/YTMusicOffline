<!DOCTYPE html>
<html>

<body>
  <div id="button" class="button">
    <div class="text">Click Me</div>
  </div>

  <style>
    * {
      padding: 0px;
      margin: 0px;
      border: none;
      outline: none;
      z-index: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14pt;
      color: var(--dark-text-color);
      overflow-x: hidden;
      overflow-y: hidden;
      color-scheme: dark;
      background-color: transparent;
      text-decoration: none;
    }

    body {
      width: 100svw;
      height: 100svh;
      background: #2b2626;
    }

    .button {
      width: 15%;
      height: 5%;
      border-radius: 8px;
      border: 2px solid #55eb63;
      cursor: pointer;
      --charge-percentage: 0%;
      background-color: transparent;
      background-image: linear-gradient(to right, #55eb63 var(--charge-percentage), transparent var(--charge-percentage));
    }

    .text {
      width: 100%;
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: #ffffff;
      line-height: 40px;
      z-index: 2;
    }
  </style>
  <script>
    const button = document.querySelector("#button");
    button.dataset.charging = "false";
    button.dataset.chargePercentage = "0.0";
    const startCharging = () => {
      button.dataset.charging = "true";
    };
    const stopCharging = () => {
      button.dataset.charging = "false";
    };
    button.addEventListener("mousedown", startCharging);
    button.addEventListener("mouseup", stopCharging);
    button.addEventListener("mouseleave", stopCharging);
    let timeLastFrame = 0;
    const Update = (time) => {
      const deltaTime = (time - timeLastFrame) / 1000.0;

      let chargePercentage = parseFloat(button.dataset.chargePercentage);

      if (button.dataset.charging == "true") {
        chargePercentage += 100.0 * deltaTime;
      } else {
        chargePercentage -= 100.0 * deltaTime;
      }

      if (chargePercentage > 100.0) {
        chargePercentage = 100.0;
      } else if (chargePercentage < 0.0) {
        chargePercentage = 0.0;
      }
      
      button.style.setProperty("--charge-percentage", `${chargePercentage}%`);
      button.dataset.chargePercentage = chargePercentage;

      timeLastFrame = time;
      requestAnimationFrame(Update);
    };
    requestAnimationFrame(Update);
  </script>
</body>

</html>
