<!DOCTYPE html>
<html>

<head>
    <script>console.time("PageLoad")</script>

    <title>EzMusic</title>
    <meta name="viewport" content="width=device-width, initial-scale=0.5, maximum-scale=0.5, user-scalable=no, interactive-widget=overlays-content">

    <!-- CSS Stylesheets are high priority -->
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/vslib/vslib.css">

    <!-- JS Scripts are low priority and run after DOM load -->
    <script src="/vslib/vslib.js" defer></script>
    <script src="/thumblib/thumblib.js" defer></script>
    <script src="/player.js" defer></script>
    <script src="/gui.js" defer></script>

    <!-- Icons are always low priority -->
    <link rel="icon" sizes="16x16" href="/icons/icon16x16.png">
    <link rel="icon" sizes="32x32" href="/icons/icon32x32.png">
    <link rel="icon" sizes="48x48" href="/icons/icon48x48.png">
    <link rel="icon" sizes="64x64" href="/icons/icon64x64.png">
    <link rel="icon" sizes="128x128" href="/icons/icon128x128.png">
    <link rel="icon" sizes="256x256" href="/icons/icon256x256.png">
</head>

<body>
    <search class="search_container">
        <input type="text" name="search_bar" role="search" class="search_bar" placeholder="Search...">
        <button class="search_button search_clear_button" onclick="Gui.OnSearchClearButton()">Clear ✖️</button>
        <button class="search_button search_submit_button" onclick="Gui.OnSearchSubmitButton()">Search 🔎</button>
    </search>

    <div class="list_container">
        <div class="vslib_container vslib_global">
            <div class="vslib_scroll vslib_global">
                <div class="vslib_element_template vslib_global">
                    <div class="element_container" onclick="Gui.OnElementClicked(this)">
                        <img class="element_thumbnail" draggable="false">
                        <div class="element_text_container">
                            <p class="element_text"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="player_container">
        <img onclick="Player.PlayPause()" class="player_thumbnail" draggable="false">
        <div class="player_flex_container">
            <div class="player_layer_top player_flex_layer">
                <p class="player_text">Nothing is playing...</p>
            </div>
            <div class="player_layer_middle player_flex_layer">
                <div class="player_button" onclick="Player.ToggleLoop()"><div class="player_loop_button_text player_button_text">🔁</div></div>
                <div class="player_button" onclick="Player.Previous()"><div class="player_button_text">⬅️</div></div>
                <div class="player_button" onclick="Player.Next()"><div class="player_button_text">➡️</div></div>
                <div class="player_button" onclick="Player.ToggleShowQueue()"><div class="player_show_queue_button_text player_button_text">Show Queue</div></div>
                <div class="player_favorite_button player_button"><div class="player_favorite_button_text player_button_text">⭐</div></div>
            </div>
            <div class="player_layer_bottom player_flex_layer">
                <audio class="player_audio" fetchpriority="high" onended="Player.Next()" loop controls></audio>
            </div>
        </div>
    </div>
</body>

</html>
